<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#050b16">
<title>TopBRS Multi-Clã — Classificação</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<main class="dashboard-shell ranking-shell">
<section class="dashboard-phone ranking-phone glass-panel">
<header class="ranking-header">
  <div class="ranking-title-icon"><svg viewBox="0 0 24 24"><rect x="3" y="12" width="5" height="8" rx="1.6" fill="currentColor" opacity=".72"/><rect x="10" y="7" width="5" height="13" rx="1.6" fill="currentColor"/><rect x="17" y="10" width="4" height="10" rx="1.6" fill="currentColor" opacity=".82"/></svg></div>
  <div><h1>Classificação</h1><p>Confira os rankings do clã</p></div>
  <button class="calendar-btn ranking-calendar-btn" id="openRankingCalendar"><svg viewBox="0 0 24 24"><rect x="4" y="5" width="16" height="15" rx="3" fill="currentColor" opacity=".18"/><path d="M8 3v4M16 3v4M4 9h16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg></button>
</header>
<div class="ranking-period" id="rankingPeriodLabel">Abril • Semana 4</div><div class="ranking-tabs-wrap glass-inset"><div class="ranking-tabs">
  <button class="ranking-tab active" data-tab="general">Geral</button>
  <button class="ranking-tab" data-tab="tournament">Torneio</button>
  <button class="ranking-tab" data-tab="donations">Doações</button>
</div></div>
<section class="podium" id="podium"></section>
<section class="ranking-table-card glass-inset">
  <div class="ranking-table-head" id="rankingTableHead"></div>
  <div class="ranking-list" id="rankingList"></div>
</section>
</section>

<nav class="bottom-nav" aria-label="Menu principal">
<button class="nav-btn" onclick="window.location.href='war.html'"><svg class="nav-svg" viewBox="0 0 24 24"><path d="M4 4l16 16M20 4L4 20" fill="none" stroke="currentColor" stroke-width="2.25" stroke-linecap="round"/><circle cx="6" cy="6" r="2.15" fill="currentColor"/><circle cx="18" cy="6" r="2.15" fill="currentColor"/></svg><span>Guerra</span></button>
<button class="nav-btn active" onclick="window.location.href='classification.html'"><svg class="nav-svg" viewBox="0 0 24 24"><rect x="3" y="12" width="5" height="8" rx="1.6" fill="currentColor" opacity=".72"/><rect x="10" y="7" width="5" height="13" rx="1.6" fill="currentColor"/><rect x="17" y="10" width="4" height="10" rx="1.6" fill="currentColor" opacity=".82"/></svg><span>Class.</span></button>
<button class="nav-btn"><svg class="nav-svg" viewBox="0 0 24 24"><circle cx="9" cy="8" r="3.1" fill="currentColor"/><circle cx="17" cy="10" r="2.6" fill="currentColor" opacity=".72"/><path d="M3.8 20c.4-3.4 2.8-5.3 5.2-5.3s4.8 1.9 5.2 5.3H3.8Z" fill="currentColor"/></svg><span>Membros</span></button>
<button class="nav-btn nav-home" onclick="window.location.href='dashboard.html'"><svg class="nav-svg" viewBox="0 0 24 24"><path d="M3.8 11.1 12 4.8l8.2 6.3v7.6a2 2 0 0 1-2 2h-4.1v-5.4H9.9v5.4H5.8a2 2 0 0 1-2-2v-7.6Z" fill="currentColor"/></svg><span>Início</span></button>
<button class="nav-btn"><svg class="nav-svg" viewBox="0 0 24 24"><path d="M8 4h8v3.2a4 4 0 0 1-8 0V4Z" fill="currentColor"/><rect x="7.4" y="16" width="9.2" height="2.2" rx="1" fill="currentColor"/></svg><span>Torneio</span></button>
<button class="nav-btn"><svg class="nav-svg" viewBox="0 0 24 24"><path d="M3.5 10.2 7.2 6l4.8 5.2L16.8 6l3.7 4.2v8.3a1.5 1.5 0 0 1-1.5 1.5H5a1.5 1.5 0 0 1-1.5-1.5v-8.3Z" fill="currentColor"/></svg><span>Liderança</span></button>
<button class="nav-btn"><svg class="nav-svg" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3.7" fill="currentColor"/><path d="M12 2.8v3M12 18.2v3M4.9 4.9 7 7M17 17l2.1 2.1M2.8 12h3M18.2 12h3M4.9 19.1 7 17M17 7l2.1-2.1" fill="none" stroke="currentColor" stroke-width="2.15" stroke-linecap="round"/></svg><span>Config.</span></button>
</nav>

<div class="ranking-calendar-overlay" id="rankingCalendarOverlay"><div class="ranking-calendar-modal glass-panel">
<button class="modal-close" id="closeRankingCalendar"><svg viewBox="0 0 24 24"><path d="M6.5 6.5l11 11M17.5 6.5l-11 11" fill="none" stroke="currentColor" stroke-width="2.35" stroke-linecap="round"/></svg></button>
<div class="modal-eyebrow">Calendário</div><h2 id="rankingCalendarTitle">Abril • Semana 4</h2><p>Mês e semana da classificação</p>
<div class="calendar-mini"><div class="calendar-months months-scroll" id="rankingMonths"></div><div class="calendar-weeks" id="rankingWeeks"></div></div>
</div></div>

<div class="ranking-detail-overlay" id="rankingDetailOverlay"><div class="ranking-detail-modal glass-panel">
<button class="modal-close" id="closeRankingDetail"><svg viewBox="0 0 24 24"><path d="M6.5 6.5l11 11M17.5 6.5l-11 11" fill="none" stroke="currentColor" stroke-width="2.35" stroke-linecap="round"/></svg></button>
<div class="modal-eyebrow">Torneio</div><h2 id="detailName">Membro</h2><p id="detailRole">Pontuação semanal do mês vigente</p>
<div class="detail-total"><span>Total do mês</span><strong id="detailTotal">0 PTS</strong></div><div class="detail-weeks" id="detailWeeks"></div>
</div></div>
</main>
<script src="classification.js"></script>

<script id="topbrs-nav-router">
(function(){
  const routes = {
    'Guerra': 'war.html',
    'Class.': 'classification.html',
    'Classificação': 'classification.html',
    'Início': 'dashboard.html'
  };

  const current = location.pathname.split('/').pop() || 'index.html';

  document.querySelectorAll('.bottom-nav .nav-btn').forEach((btn)=>{
    const label = (btn.querySelector('span')?.textContent || '').trim();
    const target = routes[label];

    if(target){
      btn.onclick = (event)=>{
        event.preventDefault();

        if(navigator.vibrate){
          navigator.vibrate(12);
        }

        if(current !== target){
          window.location.href = target;
        }
      };
    }

    btn.classList.remove('active');

    if(
      (current === 'war.html' && label === 'Guerra') ||
      (current === 'classification.html' && (label === 'Class.' || label === 'Classificação')) ||
      ((current === 'dashboard.html' || current === 'index.html') && label === 'Início')
    ){
      btn.classList.add('active');
    }
  });
})();
</script>

</body>
</html>
