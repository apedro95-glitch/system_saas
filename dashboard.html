<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#050b16" />
  <title>TopBRS Multi-Clã — Dashboard</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="dashboard-shell">
    <section class="dashboard-phone glass-panel">
      <header class="dash-header">
        <div class="dash-clan">
          <div class="dash-badge"><img src="assets/icons/clan.svg" alt="" /></div>
          <div><strong>TopBRS</strong><span>#ABC123</span></div>
        </div>
        <button class="dash-bell" aria-label="Notificações">
          <svg viewBox="0 0 24 24"><path d="M18 9a6 6 0 0 0-12 0c0 7-3 7-3 9h18c0-2-3-2-3-9" fill="currentColor"/><path d="M9.8 21a2.4 2.4 0 0 0 4.4 0" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
          <i></i>
        </button>
      </header>

      <section class="dash-title-card glass-inset">
        <h1>DASHBOARD</h1>
        <p>Visão geral do seu clã</p>
      </section>

      <section class="dash-card glass-inset">
        <div class="dash-card-head"><span>GUERRA ATUAL</span><b>Em andamento</b></div>
        <h2>Abril • Semana 4</h2>
        <div class="war-grid">
          <div><small>Ataques usados</small><strong>32 / 47</strong></div>
          <div><small>Fame</small><strong class="fame-value">✦ 89.560</strong></div>
        </div>
        <div class="progress-line"><span style="width:68%"></span></div>
      </section>

      <section class="dash-card glass-inset">
        <div class="dash-section-label">DESTAQUES</div>
        <div class="highlight-grid">
          <article><svg viewBox="0 0 24 24"><path d="M5 20h14v-2H5v2Zm1-4h12l1-10-4 3-3-6-3 6-4-3 1 10Z" fill="currentColor"/></svg><span>TOP DO CLÃ</span><strong>Pedrin</strong><small>12.350</small></article>
          <article><svg viewBox="0 0 24 24"><path d="M5 20h14v-2H5v2Zm1-4h12l1-10-4 3-3-6-3 6-4-3 1 10Z" fill="currentColor"/></svg><span>MAIS ATIVO</span><strong>Lucas</strong><small>9 ataques</small></article>
          <article><svg viewBox="0 0 24 24"><path d="M5 20h14v-2H5v2Zm1-4h12l1-10-4 3-3-6-3 6-4-3 1 10Z" fill="currentColor"/></svg><span>MAIS DOAÇÕES</span><strong>Vini</strong><small>1.284</small></article>
        </div>
      </section>

      <section class="dash-card glass-inset notifications-card">
        <div class="dash-section-label">ÚLTIMAS NOTIFICAÇÕES</div>
        <div class="dashboard-notification-list" id="dashboardNotificationList"></div>
      </section>

      <nav class="bottom-nav" aria-label="Menu principal">
        <button class="nav-btn"><svg viewBox="0 0 24 24"><path d="M4 20 20 4M14 4h6v6M20 20 4 4M4 10V4h6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg><span>Guerra</span></button>
        <button class="nav-btn"><svg viewBox="0 0 24 24"><path d="M5 20V10h4v10M10 20V4h4v16M15 20v-7h4v7M4 20h16" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/></svg><span>Class.</span></button>
        <button class="nav-btn"><svg viewBox="0 0 24 24"><path d="M8 11a3 3 0 1 0 0-6 3 3 0 0 0 0 6ZM16 11a3 3 0 1 0 0-6 3 3 0 0 0 0 6ZM3 20c.6-4 9.4-4 10 0M11 20c.5-3.4 8.5-3.4 9 0" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg><span>Membros</span></button>
        <button class="nav-btn nav-home active"><svg viewBox="0 0 24 24"><path d="M3 11 12 4l9 7v9a1 1 0 0 1-1 1h-5v-6H9v6H4a1 1 0 0 1-1-1v-9Z" fill="currentColor"/></svg><span>Início</span></button>
        <button class="nav-btn"><svg viewBox="0 0 24 24"><path d="M8 4h8v3h4c0 4-2 6-5 6-.4 1.5-1.4 2.7-3 3.2V19h4v2H8v-2h4v-2.8c-1.6-.5-2.6-1.7-3-3.2-3 0-5-2-5-6h4V4Z" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/></svg><span>Torneio</span></button>
        <button class="nav-btn"><svg viewBox="0 0 24 24"><path d="M5 19h14l1-10-5 3-3-7-3 7-5-3 1 10Z" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/></svg><span>Liderança</span></button>
        <button class="nav-btn"><svg viewBox="0 0 24 24"><path d="M12 8a4 4 0 1 0 0 8 4 4 0 0 0 0-8ZM4 12H2M22 12h-2M12 4V2M12 22v-2M6.3 6.3 4.9 4.9M19.1 19.1l-1.4-1.4M17.7 6.3l1.4-1.4M4.9 19.1l1.4-1.4" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg><span>Config.</span></button>
      </nav>
    </section>
  
    <div class="notifications-overlay" id="notificationsOverlay" aria-hidden="true">
      <div class="notifications-modal glass-panel">
        <div class="notifications-modal-head">
          <button class="modal-close" id="closeNotifications" aria-label="Fechar">×</button>
          <div class="modal-eyebrow">Central</div>
          <h2>Notificações</h2>
          <p>Últimas mensagens do seu clã</p>
        </div>
        <div class="modal-notification-scroll">
          <div class="modal-notification-list" id="modalNotificationList"></div>
        </div>
      </div>
    </div>
  </main>

<script id="dashboard-modal-js">
const demoNotifications = [
  {
    title: 'Aviso da liderança',
    time: 'Hoje, 15:30',
    unread: true,
    text: 'A liderança publicou um aviso importante para organização da guerra atual. Verifique sua participação e acompanhe as próximas orientações.'
  },
  {
    title: 'Reunião do clã',
    time: 'Hoje, 10:12',
    unread: false,
    text: 'Reunião marcada para alinhar metas, guerra e participação dos membros nesta semana.'
  },
  {
    title: 'Ataques pendentes',
    time: 'Ontem, 22:10',
    unread: true,
    text: 'Alguns membros ainda possuem ataques pendentes. Priorize completar os ataques antes do fechamento da janela.'
  },
  {
    title: 'Meta da guerra atualizada',
    time: 'Ontem, 18:40',
    unread: false,
    text: 'A meta de fame foi atualizada pela liderança para refletir o desempenho esperado da semana.'
  },
  {
    title: 'Novo membro importado',
    time: 'Segunda, 09:20',
    unread: false,
    text: 'Um novo membro foi importado para o sistema após sincronização com a API.'
  }
];

function renderDashboardNotifications(){
  const list = document.querySelector('#dashboardNotificationList');
  if(!list) return;

  const preview = demoNotifications.slice(0, 3);
  list.innerHTML = preview.map((n, index) => `
    <article class="note-item ${n.unread ? 'unread' : ''}" data-index="${index}">
      <button class="note-summary" type="button" aria-expanded="false">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M18 9a6 6 0 0 0-12 0c0 7-3 7-3 9h18c0-2-3-2-3-9" fill="none" stroke="currentColor" stroke-width="1.8"/>
          <path d="M10 21h4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
        <div>
          <strong>${n.title}</strong>
          <span>${n.time}</span>
        </div>
        ${n.unread ? '<i class="red-dot"></i>' : ''}
        <em class="note-arrow">⌄</em>
      </button>
      <div class="note-details">${n.text}</div>
    </article>
  `).join('');

  list.querySelectorAll('.note-summary').forEach((btn)=>{
    btn.addEventListener('click', ()=>{
      const item = btn.closest('.note-item');
      const isOpen = item.classList.toggle('open');
      btn.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
    });
  });
}

function renderModalNotifications(){
  const list = document.querySelector('#modalNotificationList');
  if(!list) return;
  list.innerHTML = demoNotifications.slice(0, 5).map((n, index) => `
    <article class="modal-note-row ${n.unread ? 'unread' : ''}" data-index="${index}">
      <button class="modal-note-summary" type="button" aria-expanded="false">
        <div>
          <strong>${n.title}</strong>
          <span>${n.time}</span>
        </div>
        ${n.unread ? '<i></i>' : ''}
        <em>⌄</em>
      </button>
      <div class="modal-note-details">${n.text}</div>
    </article>
  `).join('');

  list.querySelectorAll('.modal-note-summary').forEach((btn)=>{
    btn.addEventListener('click', ()=>{
      const item = btn.closest('.modal-note-row');
      const isOpen = item.classList.toggle('open');
      btn.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
    });
  });
}

document.querySelector('.dash-bell')?.addEventListener('click', ()=>{
  renderModalNotifications();
  document.querySelector('#notificationsOverlay')?.classList.add('show');
});

document.querySelector('#closeNotifications')?.addEventListener('click', ()=>{
  document.querySelector('#notificationsOverlay')?.classList.remove('show');
});

document.addEventListener('gesturestart', (event)=> event.preventDefault());
document.addEventListener('gesturechange', (event)=> event.preventDefault());
document.addEventListener('gestureend', (event)=> event.preventDefault());

let lastTouchEnd = 0;
document.addEventListener('touchend', (event)=>{
  const now = Date.now();
  if(now - lastTouchEnd <= 300){
    event.preventDefault();
  }
  lastTouchEnd = now;
}, { passive:false });

renderDashboardNotifications();
</script>

</body>
</html>
