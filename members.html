<!doctype html>
<html lang="pt-BR">
<head>

<body>
<main class="dashboard-shell members-shell">
<section class="dashboard-phone members-phone glass-panel">
  <header class="members-header">
    <div class="members-title-icon">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <circle cx="9" cy="8" r="3.1" fill="currentColor"/>
        <circle cx="17" cy="10" r="2.6" fill="currentColor" opacity=".72"/>
        <path d="M3.8 20c.4-3.4 2.8-5.3 5.2-5.3s4.8 1.9 5.2 5.3H3.8Z" fill="currentColor"/>
        <path d="M13.8 20c.3-2.5 2-4 4-4 1.9 0 3.5 1.4 3.9 4h-7.9Z" fill="currentColor" opacity=".72"/>
      </svg>
    </div>
    <div>
      <h1>Membros</h1>
      <p>Lista de membros do clã.</p>
      <span id="membersCount">47 membros</span>
    </div>
    <button class="members-sync-btn" aria-label="Sincronizar membros">
      <svg viewBox="0 0 24 24"><path d="M20 12a8 8 0 1 1-2.34-5.66" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><path d="M20 4v5h-5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
  </header>

  <section class="members-tools">
    <label class="member-search glass-inset">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <circle cx="11" cy="11" r="7" fill="none" stroke="currentColor" stroke-width="2"/>
        <path d="M16.5 16.5 21 21" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
      <input id="memberSearch" type="search" placeholder="Buscar membro..." autocomplete="off">
    </label>
    <button class="member-filter-btn glass-inset" id="memberFilterBtn" aria-label="Filtrar">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M4 6h16M7 12h10M10 18h4" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
      </svg>
    </button>
  </section>

  <section class="members-list-card glass-inset">
    <div id="membersList" class="members-list"></div>
  </section>
</section>


<div class="member-filter-overlay" id="memberFilterOverlay">
  <div class="member-filter-modal glass-panel">
    <button class="modal-close" id="closeMemberFilter" aria-label="Fechar">
      <svg viewBox="0 0 24 24"><path d="M6.5 6.5l11 11M17.5 6.5l-11 11" fill="none" stroke="currentColor" stroke-width="2.35" stroke-linecap="round"/></svg>
    </button>
    <div class="modal-eyebrow">Filtro</div>
    <h2>Filtrar membros</h2>
    <div class="member-filter-options">
      <button class="active" data-role="all">Todos</button>
      <button data-role="admin">Admin</button>
      <button data-role="co-leader">Co-líder</button>
      <button data-role="elder">Ancião</button>
      <button data-role="member">Membro</button>
    </div>
  </div>
</div>



<nav class="bottom-nav" aria-label="Menu principal">
  <button class="nav-btn" onclick="window.location.href='war.html'"><svg class="nav-svg" viewBox="0 0 24 24"><path d="M4 4l16 16M20 4L4 20" fill="none" stroke="currentColor" stroke-width="2.25" stroke-linecap="round"/><circle cx="6" cy="6" r="2.15" fill="currentColor"/><circle cx="18" cy="6" r="2.15" fill="currentColor"/></svg><span>Guerra</span></button>
  <button class="nav-btn" onclick="window.location.href='classification.html'"><svg class="nav-svg" viewBox="0 0 24 24"><rect x="3" y="12" width="5" height="8" rx="1.6" fill="currentColor" opacity=".72"/><rect x="10" y="7" width="5" height="13" rx="1.6" fill="currentColor"/><rect x="17" y="10" width="4" height="10" rx="1.6" fill="currentColor" opacity=".82"/></svg><span>Class.</span></button>
  <button class="nav-btn active" onclick="window.location.href='members.html'"><svg class="nav-svg" viewBox="0 0 24 24"><circle cx="9" cy="8" r="3.1" fill="currentColor"/><circle cx="17" cy="10" r="2.6" fill="currentColor" opacity=".72"/><path d="M3.8 20c.4-3.4 2.8-5.3 5.2-5.3s4.8 1.9 5.2 5.3H3.8Z" fill="currentColor"/></svg><span>Membros</span></button>
  <button class="nav-btn nav-home" onclick="window.location.href='dashboard.html'"><svg class="nav-svg" viewBox="0 0 24 24"><path d="M3.8 11.1 12 4.8l8.2 6.3v7.6a2 2 0 0 1-2 2h-4.1v-5.4H9.9v5.4H5.8a2 2 0 0 1-2-2v-7.6Z" fill="currentColor"/></svg><span>Início</span></button>
  <button class="nav-btn" type="button" data-construction="true"><svg class="nav-svg" viewBox="0 0 24 24"><path d="M8 4h8v3.2a4 4 0 0 1-8 0V4Z" fill="currentColor"/><path d="M6 4h2v2.2A2.8 2.8 0 0 1 5.2 9H4V6a2 2 0 0 1 2-2Z" fill="currentColor" opacity=".72"/><path d="M18 4h-2v2.2A2.8 2.8 0 0 0 18.8 9H20V6a2 2 0 0 0-2-2Z" fill="currentColor" opacity=".72"/><rect x="10.2" y="13" width="3.6" height="3.2" rx=".7" fill="currentColor"/><rect x="7.4" y="16" width="9.2" height="2.2" rx="1" fill="currentColor"/></svg><span>Torneio</span></button>
  <button class="nav-btn" type="button" data-construction="true"><svg class="nav-svg" viewBox="0 0 24 24"><path d="M3.5 10.2 7.2 6l4.8 5.2L16.8 6l3.7 4.2v8.3a1.5 1.5 0 0 1-1.5 1.5H5a1.5 1.5 0 0 1-1.5-1.5v-8.3Z" fill="currentColor"/></svg><span>Liderança</span></button>
  <button class="nav-btn" onclick="window.location.href='settings.html'"><svg class="nav-svg" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3.7" fill="currentColor"/><path d="M12 2.8v3M12 18.2v3M4.9 4.9 7 7M17 17l2.1 2.1M2.8 12h3M18.2 12h3M4.9 19.1 7 17M17 7l2.1-2.1" fill="none" stroke="currentColor" stroke-width="2.15" stroke-linecap="round"/></svg><span>Config.</span></button>
</nav>

<div class="construction-overlay" id="constructionOverlay">
  <div class="construction-modal glass-panel">
    <button class="modal-close" id="closeConstruction" aria-label="Fechar">
      <svg viewBox="0 0 24 24"><path d="M6.5 6.5l11 11M17.5 6.5l-11 11" fill="none" stroke="currentColor" stroke-width="2.35" stroke-linecap="round"/></svg>
    </button>
    <div class="modal-eyebrow">Aviso</div>
    <h2>Menu em construção…🚧</h2>
    <p>Essa área será liberada nas próximas etapas.</p>
  </div>
</div>
<script id="construction-popup-js">
function openConstructionMenu(){
  document.body.classList.add('modal-open');
  document.documentElement.classList.add('modal-open');
  document.querySelector('#constructionOverlay')?.classList.add('show');
}
function closeConstructionMenu(){
  document.querySelector('#constructionOverlay')?.classList.remove('show');
  document.body.classList.remove('modal-open');
  document.documentElement.classList.remove('modal-open');
}
document.querySelector('#closeConstruction')?.addEventListener('click', closeConstructionMenu);
document.querySelector('#constructionOverlay')?.addEventListener('click', (event)=>{
  if(event.target.id === 'constructionOverlay') closeConstructionMenu();
});
document.querySelectorAll('[data-construction="true"]').forEach(btn=>{
  btn.addEventListener('click', (event)=>{
    event.preventDefault();
    openConstructionMenu();
  });
});
</script>

<script type="module" src="i18n.js?v=i18n-stage4-final"></script>
<script type="module" src="internal-i18n.js?v=i18n-stage4-final"></script>

</main>
<script type="module" src="members.js?v=visual-fix-2"></script>
