<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#050b16">
<title>TopBRS — Painel SaaS</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="stylesheet" href="styles.css?v=signup-clan-tag-fix-1">
</head>
<body>
<main class="dashboard-shell saas-admin-shell">
  <section class="dashboard-phone glass-panel saas-admin-phone">
    <header class="settings-header premium-config-header">
      <div class="settings-header-left">
        <div class="settings-title-icon">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 3 21 8.2 12 21 3 8.2 12 3Z" fill="currentColor"/>
          </svg>
        </div>
        <div>
          <h1>Painel SaaS</h1>
          <p>Liberação manual de assinaturas</p>
        </div>
      </div>
    </header>

    <div id="saasAccessDenied" class="saas-denied glass-inset" hidden>
      <strong>Acesso restrito</strong>
      <span>Entre com uma conta autorizada como dono do SaaS.</span>
      <button class="primary-btn" onclick="window.location.href='index.html'">Voltar</button>
    </div>

    <section id="saasAdminContent" hidden>
      <form class="saas-form glass-inset" id="saasReleaseForm">
        <div class="modal-eyebrow">Nova liberação</div>

        <label class="field auth-field">
          <span>Tag do clã</span>
          <input id="saasClanTag" type="text" placeholder="#ABC123" autocomplete="off">
        </label>

        <label class="field auth-field">
          <span>Nome do clã</span>
          <input id="saasClanName" type="text" placeholder="Nome do clã">
        </label>

        <label class="field auth-field">
          <span>Email do comprador</span>
          <input id="saasBuyerEmail" type="email" placeholder="comprador@email.com">
        </label>

        <label class="field auth-field">
          <span>WhatsApp</span>
          <input id="saasBuyerPhone" type="text" placeholder="+55...">
        </label>

        <label class="field auth-field">
          <span>Plano</span>
          <select id="saasPlan">
            <option value="trial">Trial — 7 dias</option>
            <option value="basic">Básico — 1 mês</option>
            <option value="plus">Plus — 6 meses</option>
            <option value="premium">Premium — 1 ano</option>
          </select>
        </label>

        <label class="field auth-field">
          <span>Status</span>
          <select id="saasStatus">
            <option value="released">Liberado para onboarding</option>
            <option value="active">Ativo</option>
            <option value="blocked">Bloqueado</option>
            <option value="expired">Expirado</option>
          </select>
        </label>

        <button class="gold-btn" type="submit">Liberar assinatura</button>
        <small id="saasFeedback" class="tag-feedback"></small>
      </form>

      <section class="saas-list glass-inset">
        <div class="dash-section-label">CLÃS LIBERADOS</div>
        <div id="saasAccessList"></div>
      </section>
    </section>
  </section>
</main>

<script type="module" src="auth.js?v=signup-clan-tag-fix-1"></script>
<script type="module" src="saas-admin.js?v=saas-access-admin-1"></script>
</body>
</html>
