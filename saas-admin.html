<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#050b16">
<title>TopBRS — Painel SaaS</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="stylesheet" href="styles.css?v=saas-refresh-persist-1">
</head>
<body>
<div class="saas-local-gate" id="saasLocalGate">
  <div class="saas-local-modal glass-panel">
    <div class="modal-eyebrow">Acesso admin</div>
    <h2 id="saasGateTitle">Entrar no Painel SaaS</h2>
    <p id="saasGateText">Entre com o e-mail e senha Firebase do administrador SaaS.</p>
    <label class="field auth-field"><span>Email admin</span><input id="saasGateEmail" type="email" placeholder="admin@email.com" autocomplete="email"></label>
    <label class="field auth-field" id="saasGatePasswordWrap"><span>Senha do admin</span><input id="saasGatePassword" type="password" placeholder="Senha do Firebase" autocomplete="current-password"></label>
    <button class="gold-btn" type="button" id="saasGateBtn">Entrar</button>
    <small class="saas-local-error" id="saasGateError"></small>
  </div>
</div>
<main class="dashboard-shell saas-admin-shell">
  <section class="dashboard-phone glass-panel saas-admin-phone">
    <header class="settings-header premium-config-header saas-premium-head">
      <div class="settings-header-left">
        <div class="settings-title-icon"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3 21 8.2 12 21 3 8.2 12 3Z" fill="currentColor"/></svg></div>
        <div><h1>Painel SaaS</h1><p>Vendas e assinaturas</p></div>
      </div>
      <div class="saas-head-actions">
        <button class="saas-icon-action" id="openNewRelease" type="button" aria-label="Nova Liberação"><span>+</span></button>
        <button class="saas-icon-action danger" id="saasLogout" type="button" aria-label="Sair"><svg viewBox="0 0 24 24"><path d="M9 5H5v14h4M14 8l4 4-4 4M18 12H9" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
      </div>
    </header>

    <div id="saasAccessDenied" class="saas-denied glass-inset" hidden>
      <strong>Acesso restrito</strong><span>Entre com uma conta autorizada como dono do SaaS.</span><button class="primary-btn" onclick="window.location.href='index.html'">Voltar</button>
    </div>

    <section id="saasAdminContent" hidden>
      <div class="saas-kpi-grid">
        <article class="saas-kpi glass-inset"><span>Vendas</span><strong id="kpiSales">0</strong></article>
        <article class="saas-kpi glass-inset"><span>Ativos</span><strong id="kpiActive">0</strong></article>
        <article class="saas-kpi glass-inset"><span>Trial</span><strong id="kpiTrial">0</strong></article>
      </div>

      <div class="saas-tabs glass-inset" role="tablist">
        <button class="saas-tab active" data-saas-tab="sales">Vendas</button>
        <button class="saas-tab" data-saas-tab="trial">Trial</button>
        <button class="saas-tab" data-saas-tab="active">Ativos</button>
        <button class="saas-tab" data-saas-tab="expired">Expirados</button>
      </div>

      <section class="saas-list glass-inset">
        <div class="dash-section-label" id="saasListTitle">VENDAS</div>
        <div id="saasMainList"></div>
      </section>
    </section>
  </section>
</main>

<div class="saas-release-overlay" id="saasReleaseOverlay" aria-hidden="true">
  <form class="saas-form glass-panel" id="saasReleaseForm">
    <button class="modal-close" id="closeNewRelease" type="button" aria-label="Fechar"><svg viewBox="0 0 24 24"><path d="M6.5 6.5l11 11M17.5 6.5l-11 11" fill="none" stroke="currentColor" stroke-width="2.35" stroke-linecap="round"/></svg></button>
    <div class="modal-eyebrow">Nova liberação</div>
    <h2>Liberar assinatura</h2>
    <label class="field auth-field"><span>Tag do clã</span><input id="saasClanTag" type="text" placeholder="#ABC123" autocomplete="off"></label>
    <label class="field auth-field"><span>Nome do clã</span><input id="saasClanName" type="text" placeholder="Nome do clã"></label>
    <label class="field auth-field"><span>Email do comprador</span><input id="saasBuyerEmail" type="email" placeholder="comprador@email.com"></label>
    <label class="field auth-field"><span>WhatsApp</span><input id="saasBuyerPhone" type="text" placeholder="+55..."></label>
    <label class="field auth-field"><span>Plano</span><select id="saasPlan"><option value="trial">Trial — 7 dias</option><option value="basic">Básico — 1 mês</option><option value="plus">Plus — 6 meses</option><option value="premium">Premium — 1 ano</option></select></label>
    <label class="field auth-field"><span>Status</span><select id="saasStatus"><option value="released">Liberado para onboarding</option><option value="active">Ativo</option><option value="blocked">Bloqueado</option><option value="expired">Expirado</option></select></label>
    <button class="gold-btn" type="submit">Liberar assinatura</button>
    <small id="saasFeedback" class="tag-feedback"></small>
  </form>
</div>

<script type="module" src="saas-admin.js?v=saas-refresh-persist-1"></script>
</body>
</html>
