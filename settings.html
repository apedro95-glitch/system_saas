<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#050b16">
<title>TopBRS Multi-Clã — Configurações</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<main class="dashboard-shell settings-shell">
<section class="dashboard-phone settings-phone glass-panel">
  <header class="members-header">
    <div class="members-title-icon">
      <img src="assets/icons/profile-user.svg" alt="" style="width:38px;height:38px">
    </div>
    <div>
      <h1>Configurações</h1>
      <p>Perfil, plano e preferências do sistema</p>
    </div>
  </header>

  <section class="settings-profile-card glass-inset">
    <div class="member-avatar settings-avatar"><img src="assets/icons/profile-user.svg" alt=""></div>
    <div>
      <small>Perfil conectado</small>
      <h2 id="settingsNick">Carregando...</h2>
      <p id="settingsMeta">Cargo • Tag</p>
    </div>
  </section>

  <section class="settings-grid">
    <article class="settings-card glass-inset">
      <span>Plano</span>
      <strong id="settingsPlan">Premium</strong>
      <small id="settingsExpire">Expira em: configurar</small>
    </article>
    <article class="settings-card glass-inset">
      <span>Clã</span>
      <strong id="settingsClan">TopBRS</strong>
      <small id="settingsClanTag">#ABC123</small>
    </article>
  </section>

  <section class="settings-actions glass-inset">
    <button class="primary-btn" type="button" id="logoutSettings">Sair do sistema</button>
  </section>
</section>
