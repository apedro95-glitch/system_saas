<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Configurações</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="config-container">

<div class="config-header glass">
  <h1>Configurações</h1>
</div>

<div class="profile-card glass">
  <div class="avatar-wrapper">
    <img id="userAvatar" src="assets/avatars/1.png">
    <button class="edit-avatar">✎</button>
  </div>
  <h2>Usuário</h2>
  <p>Co-líder • #TAG</p>
</div>

<div class="mini-cards">
  <div class="mini-card glass">
    <span>Plano</span>
    <strong>Trial</strong>
  </div>

  <div class="mini-card glass">
    <span>Clã</span>
    <strong>TopBRS</strong>
  </div>

  <div class="mini-card glass">
    <span>Status</span>
    <strong style="color:#00ff88">Online</strong>
  </div>
</div>

<div class="config-list glass">
  <div class="item">Perfil</div>
  <div class="item">Plano</div>
  <div class="item">API</div>
  <div class="item">Usuários</div>
  <div class="item">Idioma</div>
</div>

<div class="logout-btn glass">Sair</div>

</div>

</body>
</html>
