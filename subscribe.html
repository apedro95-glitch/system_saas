<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#050b16">
<title>TopBRS — Assinatura</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="stylesheet" href="styles.css?v=firestore-api-url-1">
</head>
<body>
<main class="auth-shell subscribe-shell">
  <section class="auth-card glass-panel subscribe-card">
    <div class="brand-block">
      <div class="brand-shield" aria-hidden="true">
        <svg viewBox="0 0 120 140"><path d="M60 6 108 25v38c0 34-19 58-48 71C31 121 12 97 12 63V25L60 6Z" fill="#102955" stroke="#f2b935" stroke-width="6"/><path d="M34 72h52l-9 27H43l-9-27Z" fill="#f2b935"/><path d="M45 72 60 42l15 30H45Z" fill="#ffe69d"/></svg>
      </div>
      <p class="brand-kicker">TOPBRS</p>
      <p class="brand-sub">ASSINATURA</p>
    </div>

    <div class="auth-copy">
      <h1>Solicitar acesso</h1>
      <p>Preencha os dados para liberar o teste ou contratar um plano.</p>
    </div>

    <form class="setup-box glass-inset subscribe-form" id="subscribeForm">
      <label class="field">
        <span>Nome</span>
        <input id="subName" type="text" placeholder="Seu nome">
      </label>

      <label class="field">
        <span>Email</span>
        <input id="subEmail" type="email" placeholder="seu@email.com">
      </label>

      <label class="field">
        <span>WhatsApp</span>
        <input id="subPhone" type="text" placeholder="+55...">
      </label>

      <label class="field">
        <span>Tag do clã</span>
        <input id="subClanTag" type="text" placeholder="#ABC123">
      </label>

      <label class="field">
        <span>Plano desejado</span>
        <select id="subPlan">
          <option value="trial">Trial — 7 dias</option>
          <option value="basic">Básico — 1 mês</option>
          <option value="plus">Plus — 6 meses</option>
          <option value="premium">Premium — 1 ano</option>
        </select>
      </label>

      <button class="gold-btn" type="submit">Enviar solicitação</button>
      <small id="subscribeFeedback" class="tag-feedback"></small>
      <button class="link-btn subscribe-back-btn" type="button" onclick="window.location.href='index.html'"><b>Voltar</b></button>
    </form>
  </section>
</main>

<script type="module" src="subscribe.js?v=firestore-api-url-1"></script>
</body>
</html>
